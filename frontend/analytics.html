<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablero de Servicios · DM Global</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    .btn-export { transition: background-color 150ms ease, color 150ms ease; }
    .btn-export:hover { background-color: #f9fafb; color: #374151; }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .card-service { animation: fadein 220ms ease both; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

  <!-- ═══════════════════════════════════════════════════════════
       APP
  ════════════════════════════════════════════════════════════════ -->
  <div class="min-h-screen flex">

    <!-- SIDEBAR -->
    <aside class="fixed inset-y-0 left-0 w-60 bg-white border-r border-gray-200 flex flex-col z-40">
      <div class="h-16 flex items-center px-5 border-b border-gray-200 shrink-0">
        <a href="index.html" class="flex items-center gap-2.5">
          <span class="inline-flex items-center justify-center w-7 h-7 rounded-lg bg-gray-900">
            <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25z"/>
            </svg>
          </span>
          <span class="text-sm font-semibold text-gray-900 tracking-tight">DM Global</span>
        </a>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
        <p class="px-2 mb-2 text-[10px] font-medium text-gray-400 uppercase tracking-widest">Principal</p>
        <a href="index.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-9v9m3-13.5V21M3.75 21h16.5"/></svg>
          Dashboard
        </a>

        <p class="px-2 pt-4 pb-2 text-[10px] font-medium text-gray-400 uppercase tracking-widest">Gestión</p>
        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
          Clientes
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375"/></svg>
          Catálogo de Servicios
        </a>

        <p class="px-2 pt-4 pb-2 text-[10px] font-medium text-gray-400 uppercase tracking-widest">Analytics</p>
        <a href="analytics.html" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-gray-50 text-sm text-gray-900 font-medium transition-colors">
          <svg class="w-4 h-4 text-gray-700 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6"/>
          </svg>
          Tablero de Servicios
        </a>

        <p class="px-2 pt-4 pb-2 text-[10px] font-medium text-gray-400 uppercase tracking-widest">Sistema</p>
        <a href="usuarios.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z"/></svg>
          Usuarios del Sistema
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V19.5a2.25 2.25 0 002.25 2.25h.75"/></svg>
          Auditoría / Logs
        </a>
      </nav>

      <div class="border-t border-gray-200 px-4 py-3 shrink-0">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2.5 min-w-0">
            <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-gray-900 text-white text-xs font-medium shrink-0" id="sidebar-avatar">A</span>
            <div class="min-w-0">
              <p class="text-xs font-medium text-gray-900 truncate" id="sidebar-username">—</p>
              <p class="text-[10px] text-gray-400" id="sidebar-rol">Administrador</p>
            </div>
          </div>
          <button id="logout-btn" title="Cerrar sesión"
            class="p-1.5 rounded-md text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition-colors shrink-0">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="ml-60 flex-1 flex flex-col min-h-screen">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 sticky top-0 z-30">
        <div>
          <h1 class="text-base font-semibold text-gray-900">Tablero de Servicios</h1>
          <p class="text-xs text-gray-400 font-light" id="header-subtitle">
            Métricas de salud y rendimiento de las automatizaciones
          </p>
        </div>
        <button id="btn-refresh"
          class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
          <svg id="refresh-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
          </svg>
          Actualizar
        </button>
      </header>

      <!-- Grid de tarjetas -->
      <div class="flex-1 p-8">

        <!-- Estado de carga -->
        <div id="grid-skeleton" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          <!-- Skeletons generados por JS -->
        </div>

        <!-- Grid real (oculto hasta cargar) -->
        <div id="grid-servicios" class="hidden grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          <!-- Tarjetas generadas por analytics.js -->
        </div>

        <!-- Estado vacío -->
        <div id="estado-vacio" class="hidden text-center py-20">
          <p class="text-sm text-gray-400">No hay servicios activos en el catálogo.</p>
        </div>

        <!-- Estado error -->
        <div id="estado-error" class="hidden">
          <div class="bg-white border border-red-100 rounded-xl p-8 text-center max-w-md mx-auto">
            <p class="text-sm text-red-400 mb-3" id="error-msg"></p>
            <button onclick="cargarSalud()" class="text-xs text-gray-500 underline hover:text-gray-700 transition">
              Reintentar
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="analytics.js"></script>
</body>
</html>
