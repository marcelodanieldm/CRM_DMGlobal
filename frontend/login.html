<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión · DM Global</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4 antialiased">

  <div class="w-full max-w-sm">

    <!-- Card principal -->
    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm px-8 py-10">

      <!-- Logo / Marca -->
      <div class="text-center mb-8">
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-gray-900 mb-4">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25z"/>
          </svg>
        </span>
        <h1 class="text-base font-semibold text-gray-900">DM Global</h1>
        <p class="text-xs text-gray-400 font-light mt-1">Acceso al panel de administración</p>
      </div>

      <!-- Formulario -->
      <form id="login-form" novalidate>
        <div class="space-y-4">

          <div>
            <label for="input-email" class="block text-xs font-medium text-gray-500 mb-1.5">
              Usuario
            </label>
            <input id="input-email" name="username" type="text"
              autocomplete="username" required
              class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-white
                     placeholder-gray-300 text-gray-900
                     focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-gray-900 transition"
              placeholder="tu.usuario" />
          </div>

          <div>
            <label for="input-password" class="block text-xs font-medium text-gray-500 mb-1.5">
              Contraseña
            </label>
            <input id="input-password" name="password" type="password"
              autocomplete="current-password" required
              class="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-lg bg-white
                     placeholder-gray-300 text-gray-900
                     focus:outline-none focus:ring-1 focus:ring-gray-900 focus:border-gray-900 transition"
              placeholder="••••••••" />
          </div>
        </div>

        <!-- Error message -->
        <p id="login-error"
           class="hidden mt-3 text-xs text-red-500 text-center leading-relaxed">
        </p>

        <!-- Submit -->
        <button type="submit" id="login-btn"
          class="mt-6 w-full py-2.5 bg-gray-900 text-white text-sm font-medium rounded-lg
                 hover:bg-gray-800 active:bg-gray-950 transition
                 disabled:opacity-50 disabled:cursor-not-allowed">
          Ingresar
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-[10px] text-gray-300 mt-6 font-light">
      DM Global CRM · Acceso interno
    </p>
  </div>

  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
